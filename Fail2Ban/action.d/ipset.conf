[Definition]
# Adds/removes <ip> to an ipset set identified by <setname>.
# Assumes iptables/ip6tables have corresponding -m set --match-set <setname> ... rules.

actionstart =
actionstop =
actioncheck = ipset list <setname>

# Prefer timeout when set supports it; fall back to no timeout
actionban = ipset add <setname> <ip> timeout <bantime> -exist || ipset add <setname> <ip> -exist
actionunban = ipset del <setname> <ip> 2>/dev/null || true

[Init]
# REQUIRED: pass setname per jail, e.g. setname=ssh|sip|db|web|proxy|email
setname = blacklist
