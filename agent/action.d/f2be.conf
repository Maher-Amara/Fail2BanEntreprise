# /etc/fail2ban/action.d/f2be.conf
# Fail2BanEntreprise — Custom Fail2Ban action
#
# Pushes ban events to the central dashboard API.
# Unban events are NOT pushed — /api/unban is JWT-only (dashboard admins).
# Central ban expiry is handled automatically by Redis TTL.
#
# Prerequisites:
#   - /usr/local/bin/f2b-agent installed (Python agent)
#   - /etc/f2b-agent.conf configured with F2B_API_KEY and F2B_API_URL

[Definition]

actionstart =
actionstop  =
actioncheck =

actionban   = /usr/local/bin/f2b-agent ban   <ip> <name> <bantime>
actionunban = /usr/local/bin/f2b-agent unban <ip> <name>
