# /etc/fail2ban/jail.local — FusionPBX (Debian)
# ─────────────────────────────────────────────────────────────────
#
# Platform notes:
#   • FusionPBX ships with Fail2Ban pre-configured. The filters
#     freeswitch-ip, auth-challenge-ip, auth-challenge, fusionpbx,
#     fusionpbx-mac, nginx-404, nginx-dos are already installed in
#     /etc/fail2ban/filter.d/ by the FusionPBX setup script.
#     We only need to ENABLE them here and add f2be.
#   • SSH logs: /var/log/auth.log  (Debian — file-based, backend=auto)
#   • Web logs: /var/log/nginx/    (FusionPBX uses Nginx by default)
#   • FreeSWITCH logs: /var/log/freeswitch/freeswitch.log
#   • Ref: https://docs.fusionpbx.com/en/latest/firewall/fail2ban.html
#
# f2be action:
#   Requires agent installed via:  sudo ./install.sh
#   Requires server token from:    https://f2b.scopcall.com/servers
#
# !! CRITICAL WARNING from FusionPBX docs !!
#   Getting blocked by ANY Fail2Ban rule will block SSH, the web
#   interface, AND phone registrations simultaneously.
#   Always add your office/VPN IP to ignoreip BEFORE enabling jails.
#   Ref: https://docs.fusionpbx.com/en/latest/firewall/fail2ban.html
# ─────────────────────────────────────────────────────────────────

[DEFAULT]
# ── IPs that will NEVER be banned ──
# !! Blocking any jail blocks SSH + web + SIP phones simultaneously !!
# Loopback | Office IP | Datacenter FR subnet | Datacenter BE subnet
ignoreip = 127.0.0.1/8 ::1 196.179.222.182 213.144.214.192/26 81.95.124.53/26

# ── Ban parameters ──
bantime   = 86400      ; 24 h default (SIP jails override to 70 days)
findtime  = 300        ; 5-minute sliding window (FusionPBX default)
maxretry  = 5

# ── Backend ──
backend   = auto       ; Debian has file-based logs — auto is fine

# ── Default action ──
banaction = iptables-allports

# ─────────────────────────────────────────────────────────────────
# FREESWITCH — SIP registration brute-force (primary VoIP protection)
# Filter pre-installed by FusionPBX at /etc/fail2ban/filter.d/freeswitch-ip.conf
# Ref: https://docs.fusionpbx.com/en/latest/firewall/fail2ban.html
# ─────────────────────────────────────────────────────────────────

[freeswitch-ip]
enabled  = true
filter   = freeswitch-ip
action   = iptables-allports[name=FreeSwitchIP]
           f2be
logpath  = /var/log/freeswitch/freeswitch.log
maxretry = 5
findtime = 300
bantime  = 6048000    ; ~70 days — SIP attackers are persistent

# ─────────────────────────────────────────────────────────────────
# AUTH-CHALLENGE — SIP auth-challenge failures
# Filter pre-installed by FusionPBX
# ─────────────────────────────────────────────────────────────────

[auth-challenge-ip]
enabled  = true
filter   = auth-challenge-ip
action   = iptables-allports[name=AuthChallengeIP]
           f2be
logpath  = /var/log/freeswitch/freeswitch.log
maxretry = 5
findtime = 300
bantime  = 6048000

[auth-challenge]
# Some FusionPBX builds do not ship filter.d/auth-challenge.conf.
# Keep disabled unless `sudo test -f /etc/fail2ban/filter.d/auth-challenge.conf` passes.
enabled  = false
filter   = auth-challenge
action   = iptables-allports[name=AuthChallenge]
           f2be
logpath  = /var/log/freeswitch/freeswitch.log
maxretry = 10
findtime = 300
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# FUSIONPBX WEB — Admin portal login failures
# Filter pre-installed by FusionPBX at /etc/fail2ban/filter.d/fusionpbx.conf
# ─────────────────────────────────────────────────────────────────

[fusionpbx]
enabled  = true
filter   = fusionpbx
port     = 80,443
protocol = tcp
action   = iptables-allports[name=FusionPBX]
           f2be
logpath  = /var/log/auth.log
maxretry = 10
findtime = 60
bantime  = 3600       ; 1 hour — admins may mistype

# ─────────────────────────────────────────────────────────────────
# FUSIONPBX MAC — MAC address spoofing / provisioning abuse
# Filter pre-installed by FusionPBX
# ─────────────────────────────────────────────────────────────────

[fusionpbx-mac]
enabled  = true
filter   = fusionpbx-mac
port     = 80,443
protocol = tcp
action   = iptables-allports[name=FusionPBX-MAC]
           f2be
logpath  = /var/log/syslog
maxretry = 10
findtime = 60
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# NGINX — Web server protection
# Filter pre-installed by FusionPBX
# ─────────────────────────────────────────────────────────────────

[nginx-404]
enabled  = true
filter   = nginx-404
port     = 80,443
protocol = tcp
action   = iptables-allports[name=Nginx-404]
           f2be
logpath  = /var/log/nginx/access*.log
maxretry = 300
findtime = 60
bantime  = 3600

[nginx-dos]
enabled  = true
filter   = nginx-dos
port     = 80,443
protocol = tcp
action   = iptables-allports[name=Nginx-DOS]
           f2be
logpath  = /var/log/nginx/access*.log
maxretry = 800
findtime = 60
bantime  = 86400

[nginx-http-auth]
enabled  = true
filter   = nginx-http-auth
action   = iptables-allports[name=Nginx-Auth]
           f2be
logpath  = /var/log/nginx/error.log
maxretry = 5
findtime = 600
bantime  = 3600

# ─────────────────────────────────────────────────────────────────
# SSH — Debian uses /var/log/auth.log (file-based, no systemd needed)
# ─────────────────────────────────────────────────────────────────

[ssh]
enabled  = true
filter   = sshd
port     = 22
protocol = tcp
action   = iptables-allports[name=SSH]
           f2be
logpath  = /var/log/auth.log
maxretry = 3
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# POSTFIX — Mail relay protection
# ─────────────────────────────────────────────────────────────────

[postfix-sasl]
enabled  = true
filter   = postfix[mode=auth]
action   = iptables-multiport[name=POSTFIX-SASL, port="25,465,587"]
           f2be
logpath  = /var/log/mail.log
maxretry = 3
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# POSTGRESQL — Database auth protection
# ─────────────────────────────────────────────────────────────────

[postgresql]
enabled  = true
filter   = postgresql
port     = 5432
protocol = tcp
action   = iptables-multiport[name=POSTGRESQL, port="5432", protocol=tcp]
           f2be
logpath  = /var/log/postgresql/postgresql-16-main.log
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# RECIDIVE — Repeat offenders: all-port ban ~70 days
# WARNING: do NOT set fail2ban loglevel = DEBUG (infinite loop)
# ─────────────────────────────────────────────────────────────────

[recidive]
enabled  = true
filter   = recidive
action   = iptables-allports[name=RECIDIVE, protocol=all]
           f2be
logpath  = /var/log/fail2ban.log
maxretry = 5
findtime = 43200      ; 12 hours
bantime  = 6048000    ; ~70 days
