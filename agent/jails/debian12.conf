# /etc/fail2ban/jail.local — Debian 12+ Server
# ─────────────────────────────────────────────────────────────────
#
# Platform notes:
#   • Debian 12 (bookworm) / Debian 12+
#   • SSH logs: Systemd Journal (backend=systemd)
#   • Install Fail2Ban: apt-get install fail2ban ipset
#   • Ref: https://www.digitalocean.com/community/tutorials/
#          how-to-protect-ssh-with-fail2ban-on-debian-11
#
# f2be action:
#   Requires agent installed via:  sudo ./install.sh
#   Requires server token from:    https://f2b.scopcall.com/servers
#
# IMPORTANT — set your IPs before enabling any jails:
#   Getting blocked by any jail blocks SSH + web simultaneously.
#   Add your office IP and VPN exit IP to ignoreip.
# ─────────────────────────────────────────────────────────────────

[DEFAULT]
# ── IPs that will NEVER be banned ──
# Loopback | Office IP | Datacenter FR subnet | Datacenter BE subnet
ignoreip = 127.0.0.1/8 ::1 196.179.222.182 213.144.214.192/26 81.95.124.0/26 81.95.119.128/26

# ── Ban parameters ──
bantime   = 86400      ; 24 h default
findtime  = 600        ; 10-minute sliding window
maxretry  = 5

# ── Backend ──
backend   = auto       ; Default backend for file-based jails

# ── Default ban action (Blacklist) ──
# Per-jail actions are explicitly set to map many jails to one category setname.
action    = ipset[setname=blacklist]
            f2be[name=blacklist]

# ─────────────────────────────────────────────────────────────────
# SSH — Most important jail on any internet-facing server
# Debian 12/13: Uses systemd journal for sshd logging
# ─────────────────────────────────────────────────────────────────

[ssh]
enabled  = true
filter   = sshd
port     = ssh
protocol = tcp
action   = ipset[setname=ssh]
           f2be[name=ssh]
backend  = systemd
maxretry = 3
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# RECIDIVE — Persistent offenders get much longer bans
# ─────────────────────────────────────────────────────────────────

[blacklist]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
action   = ipset[setname=blacklist]
           f2be[name=blacklist]
findtime = 86400
maxretry = 5
bantime  = 6048000
