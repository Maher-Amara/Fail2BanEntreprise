# /etc/fail2ban/jail.local — FusionPBX (Debian)
# ─────────────────────────────────────────────────────────────────
#
# Platform notes:
#   • FusionPBX ships with Fail2Ban pre-configured. The filters
#     freeswitch-ip, auth-challenge-ip, auth-challenge, fusionpbx,
#     fusionpbx-mac, nginx-404, nginx-dos are already installed in
#     /etc/fail2ban/filter.d/ by the FusionPBX setup script.
#     We only need to ENABLE them here and add f2be.
#   • SSH logs:       /var/log/auth.log  (Debian — file-based, backend=auto)
#   • FreeSWITCH logs:/var/log/freeswitch/freeswitch.log
#   • Ref: https://docs.fusionpbx.com/en/latest/firewall/fail2ban.html
#
# f2be action:
#   Requires agent installed via:  sudo ./install.sh
#   Requires server token from:    https://f2b.scopcall.com/servers
#
# !! CRITICAL WARNING from FusionPBX docs !!
#   Getting blocked by ANY Fail2Ban rule will block SSH, the web
#   interface, AND phone registrations simultaneously.
#   Always add your office/VPN IP to ignoreip BEFORE enabling jails.
#   Ref: https://docs.fusionpbx.com/en/latest/firewall/fail2ban.html
# ─────────────────────────────────────────────────────────────────

[DEFAULT]
# ── IPs that will NEVER be banned ──
# !! Blocking any jail blocks SSH + web + SIP phones simultaneously !!
# Loopback | Office IP | Datacenter FR subnet | Datacenter BE subnet
ignoreip = 127.0.0.1/8 ::1 196.179.222.182 213.144.214.193/26 81.95.124.1/26 81.95.119.129/26

# ── Ban parameters ──
bantime   = 86400      ; 24 h default (SIP jails override to 70 days)
findtime  = 300        ; 5-minute sliding window (FusionPBX default)
maxretry  = 5

# ── Backend ──
backend   = auto       ; Debian has file-based logs — auto is fine

# ── Default ban action (Blacklist) ──
# Per-jail actions are explicitly set to map many jails to one category setname.
action    = ipset[setname=blacklist]
            f2be[name=blacklist]

# ─────────────────────────────────────────────────────────────────
# SSH — Debian: SSH auth logs to /var/log/auth.log (file-based)
# ─────────────────────────────────────────────────────────────────

[ssh]
enabled  = true
filter   = sshd
port     = 22
protocol = tcp
action   = ipset[setname=ssh]
           f2be[name=ssh]
logpath  = /var/log/auth.log
backend  = auto
maxretry = 3
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# SIP — FreeSWITCH / FusionPBX built-in filters
# ─────────────────────────────────────────────────────────────────

[sip-auth-challenge-ip]
enabled  = true
filter   = auth-challenge-ip
action   = ipset[setname=sip]
           f2be[name=sip]
logpath  = /var/log/freeswitch/freeswitch.log
maxretry = 5
findtime = 300
bantime  = 6048000

[sip-freeswitch-ip]
enabled  = true
filter   = freeswitch-ip
action   = ipset[setname=sip]
           f2be[name=sip]
logpath  = /var/log/freeswitch/freeswitch.log
maxretry = 5
findtime = 300
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# WEB — PHP
# ─────────────────────────────────────────────────────────────────

[web-php-url-fopen]
enabled  = true
# PHP-FPM paths across versions/distros (php7.x, php8.x, packaged variants).
filter   = php-url-fopen
action   = ipset[setname=web]
           f2be[name=web]
logpath  = /var/log/php*/error.log
           /var/log/php*.log
           /var/log/php*-fpm.log
           /var/log/php*-fpm/*.log
maxretry = 5
findtime = 600
bantime  = 3600


# ─────────────────────────────────────────────────────────────────
# PROXY — Nginx  (FusionPBX uses Nginx as web front-end)
# ─────────────────────────────────────────────────────────────────

[proxy-nginx-http-auth]
enabled  = true
filter   = nginx-http-auth
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/error.log
maxretry = 5
findtime = 600
bantime  = 3600

[proxy-nginx-botsearch]
enabled  = true
filter   = nginx-botsearch
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/access.log
           /var/log/nginx/error.log
maxretry = 3
findtime = 600
bantime  = 3600

[proxy-nginx-limit-req]
enabled  = true
filter   = nginx-limit-req
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/error.log
maxretry = 10
findtime = 600
bantime  = 3600

[proxy-nginx-dos]
enabled  = true
filter   = nginx-dos
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/error.log
           /var/log/nginx/access.log
maxretry = 5
findtime = 600
bantime  = 3600

[proxy-nginx-404]
enabled  = true
filter   = nginx-404
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/access.log
maxretry = 10
findtime = 600
bantime  = 3600


# ─────────────────────────────────────────────────────────────────
# EMAIL — Postfix
# FusionPBX/Debian: Postfix logs to /var/log/mail.log (file-based)
# Also check syslog for installations that route to it.
# ─────────────────────────────────────────────────────────────────

[email-postfix-auth]
enabled  = true
filter   = postfix[mode=auth]
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.log
           /var/log/mail.info
maxretry = 3
findtime = 600
bantime  = 6048000

[email-postfix-reject]
enabled  = true
filter   = postfix[mode=more]
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.log
           /var/log/mail.info
maxretry = 5
findtime = 600
bantime  = 3600

# ─────────────────────────────────────────────────────────────────
# EMAIL — Dovecot
# Debian: Dovecot logs via syslog → also available in journald.
# Use backend=systemd for reliable capture across distro variants.
# ─────────────────────────────────────────────────────────────────

[email-dovecot]
enabled  = true
filter   = dovecot
action   = ipset[setname=email]
           f2be[name=email]
backend  = systemd
journalmatch = _SYSTEMD_UNIT=dovecot.service
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# EMAIL — Sendmail
# ─────────────────────────────────────────────────────────────────

[email-sendmail-auth]
enabled  = false
# Enable if sendmail is installed (FusionPBX typically uses Postfix).
filter   = sendmail-auth
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.log
maxretry = 5
findtime = 600
bantime  = 86400

[email-sendmail-reject]
enabled  = false
# Enable if sendmail is installed (FusionPBX typically uses Postfix).
filter   = sendmail-reject
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.log
maxretry = 10
findtime = 600
bantime  = 3600

# ─────────────────────────────────────────────────────────────────
# EMAIL — solid-pop3d (POP3 daemon)
# ─────────────────────────────────────────────────────────────────

[email-solid-pop3d]
enabled  = false
# Enable if solid-pop3d is installed on this host.
filter   = solid-pop3d
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.log
           /var/log/syslog
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# DB — PostgreSQL  (FusionPBX uses PostgreSQL)
# ─────────────────────────────────────────────────────────────────

[db-postgresql-auth]
enabled  = true
filter   = postgresql
port     = 5432
protocol = tcp
action   = ipset[setname=db]
           f2be[name=db]
logpath  = /var/log/postgresql/postgresql-*-main.log
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# RECIDIVE — Persistent offenders get much longer bans
# ─────────────────────────────────────────────────────────────────

[blacklist-recidive]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
action   = ipset[setname=blacklist]
           f2be[name=blacklist]
findtime = 86400
maxretry = 5
bantime  = 6048000
