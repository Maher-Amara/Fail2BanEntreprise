# /etc/fail2ban/jail.local — FusionPBX (Debian)
# ─────────────────────────────────────────────────────────────────
#
# Platform notes:
#   • FusionPBX ships with Fail2Ban pre-configured. The filters
#     freeswitch-ip, freeswitch-acl, freeswitch, sip-auth-challenge,
#     sip-auth-failure (subset of freeswitch), fusionpbx,
#     fusionpbx-mac, nginx-http-auth, nginx-botsearch, nginx-limit-req,
#     nginx-dos, nginx-404, nginx-bad-request are already installed in
#     /etc/fail2ban/filter.d/ by the FusionPBX setup script.
#     We only need to ENABLE them here and add f2be.
#   • SSH logs:       /var/log/auth.log  (Debian — file-based, backend=auto)
#   • FreeSWITCH logs:/var/log/freeswitch/freeswitch.log*  (glob; SIP jails)
#   • Ref: https://docs.fusionpbx.com/en/latest/firewall/fail2ban.html
#
# f2be action:
#   Requires agent installed via:  sudo ./install.sh
#   Requires server token from:    https://f2b.scopcall.com/servers
#
# !! CRITICAL WARNING from FusionPBX docs !!
#   Getting blocked by ANY Fail2Ban rule will block SSH, the web
#   interface, AND phone registrations simultaneously.
#   Always add your office/VPN IP to ignoreip BEFORE enabling jails.
#   Ref: https://docs.fusionpbx.com/en/latest/firewall/fail2ban.html
# ─────────────────────────────────────────────────────────────────

[DEFAULT]
ignoreip = 127.0.0.1/8 ::1 196.179.222.182 213.144.214.192/26 81.95.124.0/26 81.95.119.128/26

# ── Ban parameters ──
bantime   = 6048000    ; ~70 days default — VoIP attackers are persistent
findtime  = 600        ; 10-minute sliding window
maxretry  = 5

# ── Backend ──
backend   = auto       ; Debian has file-based logs — auto is fine

# ── Default ban action (Blacklist) ──
# Per-jail actions are explicitly set to map many jails to one category setname.
action    = ipset[setname=blacklist]
            f2be[name=blacklist]

# Avoid expensive reverse DNS lookups when processing attacker IPs.
usedns    = warn

# ─────────────────────────────────────────────────────────────────
# SSH — Debian: SSH auth logs to /var/log/auth.log (file-based)
# ─────────────────────────────────────────────────────────────────

[ssh]
enabled  = true
filter   = sshd
port     = 22
protocol = tcp
action   = ipset[setname=ssh]
           f2be[name=ssh]
logpath  = /var/log/auth.log
backend  = auto
maxretry = 3
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# SIP — FreeSWITCH (FusionPBX)
# ─────────────────────────────────────────────────────────────────

[sip-auth-challenge]
enabled  = true
filter   = sip-auth-challenge
action   = ipset[setname=sip]
           f2be[name=sip]
logpath  = /var/log/freeswitch/freeswitch.log*
backend  = auto
maxretry = 5
findtime = 300
bantime  = 6048000

[sip-freeswitch-auth]
enabled  = true
filter   = freeswitch
action   = ipset[setname=sip]
           f2be[name=sip]
logpath  = /var/log/freeswitch/freeswitch.log*
backend  = auto
maxretry = 5
findtime = 600
bantime  = 6048000

[sip-freeswitch-ip]
enabled  = true
filter   = freeswitch-ip
action   = ipset[setname=sip]
           f2be[name=sip]
logpath  = /var/log/freeswitch/freeswitch.log*
backend  = auto
maxretry = 5
findtime = 600
bantime  = 6048000

[sip-freeswitch-acl]
enabled  = true
filter   = freeswitch-acl
action   = ipset[setname=sip]
           f2be[name=sip]
logpath  = /var/log/freeswitch/freeswitch.log*
backend  = auto
maxretry = 5
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# WEB — PHP URL-injection & FusionPBX
# ─────────────────────────────────────────────────────────────────

[web-php-url-fopen]
enabled  = true
filter   = php-url-fopen
action   = ipset[setname=web]
           f2be[name=web]
logpath  = /var/log/nginx/access.log
backend  = auto
maxretry = 5
findtime = 600
bantime  = 3600

[web-fusionpbx-auth]
enabled  = true
filter   = fusionpbx
action   = ipset[setname=web]
           f2be[name=web]
logpath  = /var/log/nginx/error.log
           /var/log/syslog*
backend  = auto
maxretry = 5
findtime = 600
bantime  = 3600

[web-fusionpbx-mac]
enabled  = true
filter   = fusionpbx-mac
action   = ipset[setname=web]
           f2be[name=web]
logpath  = /var/log/syslog*
backend  = auto
maxretry = 5
findtime = 600
bantime  = 3600

[web-fusionpbx-inbound-404]
enabled  = true
filter   = fusionpbx-404
action   = ipset[setname=web]
           f2be[name=web]
logpath  = /var/log/freeswitch/freeswitch.log*
backend  = auto
maxretry = 5
findtime = 600
bantime  = 3600


# ─────────────────────────────────────────────────────────────────
# PROXY — Nginx (FusionPBX web front-end)
# ─────────────────────────────────────────────────────────────────
[proxy-nginx-http-auth]
enabled  = true
filter   = nginx-http-auth
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/error.log
backend  = auto
maxretry = 5
findtime = 600
bantime  = 3600

[proxy-nginx-limit-req]
enabled  = true
filter   = nginx-limit-req
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/error.log
backend  = auto
maxretry = 10
findtime = 600
bantime  = 3600

[proxy-nginx-bad-request]
enabled  = true
filter   = nginx-bad-request
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/access.log
backend  = auto
maxretry = 5
findtime = 600
bantime  = 3600

[proxy-nginx-botsearch]
enabled  = true
filter   = nginx-botsearch
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/access.log
           /var/log/nginx/error.log
backend  = auto
maxretry = 3
findtime = 600
bantime  = 3600

[proxy-nginx-dos]
enabled  = true
filter   = nginx-dos
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/access.log
backend  = auto
maxretry = 5
findtime = 600
bantime  = 3600

[proxy-nginx-404]
enabled  = true
filter   = nginx-404
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/nginx/access.log
backend  = auto
maxretry = 10
findtime = 600
bantime  = 3600


# ─────────────────────────────────────────────────────────────────
# EMAIL — Postfix
# FusionPBX/Debian: Postfix logs to /var/log/mail.log (file-based)
# ─────────────────────────────────────────────────────────────────
[email-postfix-auth]
enabled  = true
filter   = postfix[mode=auth]
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.log*
backend  = auto
maxretry = 3
findtime = 600
bantime  = 6048000

[email-postfix-reject]
enabled  = true
filter   = postfix[mode=more]
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.log*
backend  = auto
maxretry = 5
findtime = 600
bantime  = 3600

# ─────────────────────────────────────────────────────────────────
# DB — PostgreSQL  (FusionPBX uses PostgreSQL)
# ─────────────────────────────────────────────────────────────────

[db]

enabled  = false               ; enable if postgresql is publicly exposed
filter   = postgresql
port     = 5432
protocol = tcp
action   = ipset[setname=db]
           f2be[name=db]
logpath  = /var/log/postgresql/postgresql-*-main.log
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# RECIDIVE — Persistent offenders get much longer bans
# ─────────────────────────────────────────────────────────────────

[blacklist]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
action   = ipset[setname=blacklist]
           f2be[name=blacklist]
findtime = 86400
maxretry = 5
bantime  = 6048000
