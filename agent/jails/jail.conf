# Minimal Fail2Ban config — category-centric jails mapped to ipset sets
# Deploy by copying this file to /etc/fail2ban/jail.local (do not edit upstream jail.conf)
#
# ipset sets expected (created by the firewall step):
#   whitelist (hash:net), ssh, sip, db, web, proxy, email, blacklist (hash:ip)
#   Note: 'blacklist' is a global fallback used by the ipset action if no setname is provided.
#
# ignoreip per request:
#   127.0.0.1 196.179.222.182 213.144.214.192/26 81.95.124.0/26 81.95.119.128/26

[DEFAULT]
ignoreip = 127.0.0.1/8 ::1 196.179.222.182 213.144.214.192/26 81.95.124.0/26 81.95.119.128/26
bantime   = 6048000
findtime  = 600
maxretry  = 5
backend   = auto

# Use our category ipset action template
banaction = ipset
action    = %(action_)s

# SSH — logs backend depends on distro; for openSUSE/SLES/ViciBox use systemd
[ssh]
enabled   = true
filter    = sshd[mode=normal]
backend   = systemd
action    = ipset[name=ssh, setname=ssh]
maxretry  = 3
findtime  = 600
bantime   = 604800

# SIP — default to Asterisk logs; switch to freeswitch by changing filter/logpath
[sip]
enabled   = true
filter    = asterisk
logpath   = /var/log/asterisk/messages
# Alternative (uncomment on FreeSWITCH):
# filter  = freeswitch
# logpath = /var/log/freeswitch/freeswitch.log
action    = ipset[name=sip, setname=sip]
maxretry  = 3
findtime  = 600
bantime   = 6048000

# Database — default to MySQL/MariaDB; switch to PostgreSQL by changing filter/logpath
[db]
enabled   = true
filter    = mysqld-auth
logpath   = /var/log/mysql/mysqld.log
# Alternative (PostgreSQL):
# filter  = postgresql
# logpath = /var/log/postgresql/postgresql-*.log
action    = ipset[name=db, setname=db]
maxretry  = 5
findtime  = 600
bantime   = 86400

# Web (PHP) — monitor PHP error logs for suspicious activity (optional)
[web]
enabled   = false
# Common PHP error log locations; adjust per distro/version
logpath   = /var/log/php*/error.log
           /var/log/php*-fpm/*.log
filter    = php-url-fopen
action    = ipset[name=web, setname=web]
maxretry  = 5
findtime  = 600
bantime   = 3600

# Proxy — default to Apache; switch to Nginx bychanging filter/logpath
[proxy]
enabled   = true
filter    = apache-auth
logpath   = /var/log/apache2/error_log
            /var/log/apache2/access_log
# Alternative (Nginx):
# filter  = nginx-http-auth
# logpath = /var/log/nginx/error.log
action    = ipset[name=proxy, setname=proxy]
maxretry  = 5
findtime  = 600
bantime   = 86400

# Email — default to Postfix; switch to Dovecot by changing filter/logpath
[email]
enabled   = true
filter    = postfix
backend   = systemd
journalmatch = _SYSTEMD_UNIT=postfix.service
# Alternative (Dovecot):
# filter  = dovecot
# logpath = /var/log/dovecot.log
action    = ipset[name=email, setname=email]
maxretry  = 5
findtime  = 600
bantime   = 86400
