# /etc/fail2ban/jail.local — ViciDial (openSUSE / SLES)
# ─────────────────────────────────────────────────────────────────
#
# Platform notes:
#   • ViciDial runs on openSUSE / CentOS / SLES — typically no
#     /var/log/auth.log; SSH auth goes to systemd journal only.
#   • SSH logs:       systemd journal  → backend=systemd (REQUIRED)
#   • Asterisk logs:  /var/log/asterisk/messages  (file-based)
#   • Apache logs:    /var/log/apache2/  (access_log / error_log)
#   • Mail logs:      /var/log/mail.*  + journald
#   • phpMyAdmin:     journald only  → backend=systemd + journalmatch
#   • Dovecot:        journald only  → backend=systemd + journalmatch
#   • MySQL logs:     /var/log/mysql/mysqld.log
#   • Ref: https://www.vicidial.org/VICIDIALfail2Ban.php
#
# f2be action:
#   Requires agent installed via:  sudo ./install.sh
#   Requires server token from:    https://f2b.scopcall.com/servers
#
# IMPORTANT — set your IPs before enabling any jails:
#   Getting blocked by any jail blocks SSH + web simultaneously.
#   Add your office IP and VPN exit IP to ignoreip.
# ─────────────────────────────────────────────────────────────────

[DEFAULT]
# ── IPs that will NEVER be banned ──
# Loopback | Office IP | Datacenter FR subnet | Datacenter BE subnet
ignoreip = 127.0.0.1/8 ::1 196.179.222.182 213.144.214.193/26 81.95.124.1/26 81.95.119.129/26

# ── Ban parameters ──
bantime   = 6048000    ; ~70 days default — VoIP attackers are persistent
findtime  = 600        ; 10-minute sliding window
maxretry  = 5

# ── Backend ──
# openSUSE: use 'auto' globally; SSH jail overrides to 'systemd'.
backend   = auto

# Avoid expensive reverse DNS lookups when processing attacker IPs.
usedns    = warn

# ── Default ban action (Blacklist) ──
# Per-jail actions are explicitly set to map many jails to one category setname.
action    = ipset[setname=blacklist]
            f2be[name=blacklist]

# ─────────────────────────────────────────────────────────────────
# SSH — openSUSE/SLES: MUST use backend=systemd (no file-based SSH logs)
# ─────────────────────────────────────────────────────────────────

[ssh]
enabled  = true
filter   = sshd[mode=normal]
action   = ipset[setname=ssh]
           f2be[name=ssh]
backend  = systemd
maxretry = 3
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# SIP — Asterisk  (primary VoIP protection for ViciDial)
# asterisk.conf filter monitors registration failures and auth errors.
# ─────────────────────────────────────────────────────────────────

[sip]
enabled  = true
filter   = asterisk
action   = ipset[setname=sip]
           f2be[name=sip]
logpath  = /var/log/asterisk/messages
maxretry = 3
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# PROXY — Apache  (ViciDial uses Apache as web front-end)
# ─────────────────────────────────────────────────────────────────

[proxy-apache-auth]
enabled  = true
filter   = apache-auth
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/error_log
maxretry = 5
findtime = 600
bantime  = 3600

[proxy-apache-badbots]
enabled  = true
filter   = apache-badbots
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/access_log
maxretry = 3
findtime = 600
bantime  = 3600

[proxy-apache-botsearch]
enabled  = true
filter   = apache-botsearch
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/error_log
           /var/log/apache2/access_log
maxretry = 3
findtime = 600
bantime  = 3600

[proxy-apache-fakegooglebot]
enabled  = true
filter   = apache-fakegooglebot
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/access_log
maxretry = 1
findtime = 600
bantime  = 86400

[proxy-apache-modsecurity]
enabled  = true
filter   = apache-modsecurity
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/error_log
maxretry = 3
findtime = 600
bantime  = 3600

[proxy-apache-nohome]
enabled  = true
filter   = apache-nohome
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/access_log
maxretry = 3
findtime = 600
bantime  = 3600

[proxy-apache-noscript]
enabled  = true
filter   = apache-noscript
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/access_log
maxretry = 3
findtime = 600
bantime  = 3600

[proxy-apache-overflows]
enabled  = true
filter   = apache-overflows
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/error_log
maxretry = 2
findtime = 600
bantime  = 3600

[proxy-apache-pass]
enabled  = true
filter   = apache-pass
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/error_log
maxretry = 3
findtime = 600
bantime  = 3600

[proxy-apache-shellshock]
enabled  = true
filter   = apache-shellshock
action   = ipset[setname=proxy]
           f2be[name=proxy]
logpath  = /var/log/apache2/error_log
           /var/log/apache2/access_log
maxretry = 1
findtime = 600
bantime  = 86400


# ─────────────────────────────────────────────────────────────────
# WEB — PHP
# ─────────────────────────────────────────────────────────────────

[web-phpmyadmin]
enabled  = true
filter   = phpmyadmin-syslog
action   = ipset[setname=web]
           f2be[name=web]
backend  = systemd
journalmatch = SYSLOG_IDENTIFIER=phpMyAdmin
maxretry = 5
findtime = 600
bantime  = 3600

# ─────────────────────────────────────────────────────────────────
# EMAIL — Postfix
# ViciDial (openSUSE): Postfix logs to syslog (/var/log/mail.*).
# Also available via journald for installations using systemd-journald.
# ─────────────────────────────────────────────────────────────────

[email-postfix-auth]
enabled  = true
filter   = postfix[mode=auth]
action   = ipset[setname=email]
           f2be[name=email]
backend  = systemd
journalmatch = _SYSTEMD_UNIT=postfix.service
logpath  = /var/log/mail.info
           /var/log/mail.warn
           /var/log/mail.err
           /var/log/mail
maxretry = 3
findtime = 600
bantime  = 6048000

[email-postfix-reject]
enabled  = true
filter   = postfix[mode=more]
action   = ipset[setname=email]
           f2be[name=email]
backend  = systemd
journalmatch = _SYSTEMD_UNIT=postfix.service
logpath  = /var/log/mail.info
           /var/log/mail.warn
           /var/log/mail
maxretry = 5
findtime = 600
bantime  = 3600

# ─────────────────────────────────────────────────────────────────
# EMAIL — Dovecot
# ViciDial (openSUSE): Dovecot logs via syslog and journald.
# Use backend=systemd for reliable capture.
# ─────────────────────────────────────────────────────────────────

[email-dovecot]
enabled  = true
filter   = dovecot
action   = ipset[setname=email]
           f2be[name=email]
backend  = systemd
journalmatch = _SYSTEMD_UNIT=dovecot.service
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# EMAIL — Sendmail
# ─────────────────────────────────────────────────────────────────

[email-sendmail-auth]
enabled  = true
filter   = sendmail-auth
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.info
           /var/log/mail.warn
           /var/log/mail
maxretry = 5
findtime = 600
bantime  = 86400

[email-sendmail-reject]
enabled  = true
filter   = sendmail-reject
action   = ipset[setname=email]
           f2be[name=email]
logpath  = /var/log/mail.info
           /var/log/mail.warn
           /var/log/mail
maxretry = 10
findtime = 600
bantime  = 3600

# ─────────────────────────────────────────────────────────────────
# DB — MySQL / MariaDB  (ViciDial database)
# Custom filter: /etc/fail2ban/filter.d/mysqld-auth.conf
# ─────────────────────────────────────────────────────────────────

[db-mysqld-auth]
enabled  = true
filter   = mysqld-auth
action   = ipset[setname=db]
           f2be[name=db]
logpath  = /var/log/mysql/mysqld.log
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# RECIDIVE — Persistent offenders get much longer bans
# ─────────────────────────────────────────────────────────────────

[blacklist-recidive]
enabled  = true
filter   = recidive
logpath  = /var/log/fail2ban.log
action   = ipset[setname=blacklist]
           f2be[name=blacklist]
findtime = 86400
maxretry = 5
bantime  = 6048000
