# /etc/fail2ban/jail.local — ViciDial / ViciBox (openSUSE / SLES)
# ─────────────────────────────────────────────────────────────────
#
# Platform notes:
#   • openSUSE / SLES: SSH logs are in systemd journal ONLY — no /var/log/secure
#     or /var/log/auth.log exists. SSH jail MUST use backend = systemd.
#   • Apache log suffix is error_log (not error.log) on openSUSE.
#   • Install Fail2Ban: yast2 -i fail2ban ipset
#
# f2be action:
#   Requires agent installed as:   /usr/local/bin/f2b-agent
#   Requires server token from:    https://f2b.scopcall.com/servers
#
# IMPORTANT — set your IPs before enabling any jails:
#   Getting blocked by any jail blocks SSH + SIP + web simultaneously.
#   Add your office IP, VPN exit IP, and server subnet to ignoreip.
# ─────────────────────────────────────────────────────────────────

[DEFAULT]
# ── IPs that will NEVER be banned ──
# Loopback | Office IP | Datacenter FR subnet | Datacenter BE subnet
ignoreip = 127.0.0.1/8 ::1 196.179.222.182 213.144.214.192/26 81.95.124.53/26

# ── Ban parameters ──
bantime   = 6048000    ; ~70 days default — VoIP attackers are persistent
findtime  = 600        ; 10-minute sliding window
maxretry  = 5

# ── Backend ──
# openSUSE: use 'systemd' so the SSH jail can read the journal.
# Other jails with file-based logs use 'auto' per-jail override.
backend   = auto

# Avoid expensive reverse DNS lookups when processing attacker IPs.
usedns    = warn

# ── Default action ──
banaction = iptables-allports

# ─────────────────────────────────────────────────────────────────
# ASTERISK / SIP — Primary VoIP protection
# ─────────────────────────────────────────────────────────────────

[asterisk]
enabled  = true
filter   = asterisk
action   = iptables-allports[name=ASTERISK, protocol=all]
           f2be
logpath  = /var/log/asterisk/messages
maxretry = 3
findtime = 600
bantime  = 6048000


# ─────────────────────────────────────────────────────────────────
# SSH — openSUSE/SLES: MUST use backend=systemd (no file-based SSH logs)
# ─────────────────────────────────────────────────────────────────

[sshd]
enabled  = true
filter   = sshd[mode=normal]
action   = iptables-allports[name=SSH, protocol=tcp]
           f2be
backend  = systemd
maxretry = 3
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# APACHE — ViciDial admin UI / agent screen
# ─────────────────────────────────────────────────────────────────

[apache-auth]
enabled  = true
filter   = apache-auth
action   = iptables-allports[name=APACHE-AUTH, protocol=tcp]
           f2be
logpath  = /var/log/apache2/error_log
maxretry = 5
findtime = 600
bantime  = 3600

[apache-badbots]
enabled  = true
filter   = apache-badbots
action   = iptables-multiport[name=APACHE-BADBOTS, port="http,https"]
           f2be
logpath  = /var/log/apache2/access_log
maxretry = 1
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# VICIBOX PORTAL — Dynamic portal (port 443/446)
# Custom filter: /etc/fail2ban/filter.d/vicibox-portal.conf
# ─────────────────────────────────────────────────────────────────

[vicibox-portal]
# Requires custom filter: /etc/fail2ban/filter.d/vicibox-portal.conf
# Keep disabled until the filter file exists.
enabled  = false
filter   = vicibox-portal
action   = iptables-multiport[name=VICIBOX-PORTAL, port="443,446", protocol=tcp]
           f2be
logpath  = /var/log/apache2/dynportal-error_log
           /var/log/apache2/error_log
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# MYSQL — ViciDial database
# Custom filter: /etc/fail2ban/filter.d/mysqld-auth.conf
# ─────────────────────────────────────────────────────────────────

[mysqld-auth]
enabled  = true
filter   = mysqld-auth
action   = iptables-multiport[name=MYSQL, port="3306", protocol=tcp]
           f2be
logpath  = /var/log/mysql/mysqld.log
maxretry = 5
findtime = 600
bantime  = 86400

# ─────────────────────────────────────────────────────────────────
# PAM — Generic PAM authentication failures
# ─────────────────────────────────────────────────────────────────

[pam-generic]
enabled  = true
mode     = normal
filter   = pam-generic
action   = iptables-allports[name=PAM, protocol=all]
           f2be
backend  = systemd
maxretry = 5
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# PHPMYADMIN — Database admin UI
# Best signal for Fail2Ban is HTTP auth failures in Apache logs.
# If phpMyAdmin auth is not logged, protect /phpmyadmin with Apache auth
# (htpasswd/LDAP) so failed attempts are logged and bannable.
# ─────────────────────────────────────────────────────────────────

[phpmyadmin-syslog]
enabled  = true
mode     = normal
filter   = phpmyadmin-syslog
action   = iptables-allports[name=PHPMYADMIN, port=https, protocol=tcp]
           f2be
logpath  = /var/log/apache2/error_log
maxretry = 2
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# MAIL — SMTP/IMAP/POP abuse protection for voicemail and user mail
# ─────────────────────────────────────────────────────────────────

[postfix]
enabled  = true
mode     = more
filter   = postfix
action   = iptables-multiport[name=POSTFIX, port="25,465,587", protocol=tcp]
           f2be
backend  = systemd
journalmatch = _SYSTEMD_UNIT=postfix.service
maxretry = 5
findtime = 600
bantime  = 6048000

[postfix-sasl]
enabled  = true
filter   = postfix[mode=auth]
action   = iptables-multiport[name=POSTFIX-SASL, port="25,465,587", protocol=tcp]
           f2be
backend  = systemd
journalmatch = _SYSTEMD_UNIT=postfix.service
maxretry = 3
findtime = 600
bantime  = 6048000

[dovecot]
# Disabled on hosts without /var/log/mail.log or /var/log/maillog
enabled  = false
filter   = dovecot
action   = iptables-multiport[name=DOVECOT, port="110,143,993,995,4190", protocol=tcp]
           f2be
logpath  = /var/log/mail.log
           /var/log/maillog
maxretry = 5
findtime = 600
bantime  = 6048000

# ─────────────────────────────────────────────────────────────────
# RECIDIVE — Repeat offenders: ban across ALL ports for ~70 days
# WARNING: do NOT set fail2ban loglevel = DEBUG (infinite loop)
# ─────────────────────────────────────────────────────────────────

[recidive]
enabled  = true
filter   = recidive
action   = iptables-allports[name=RECIDIVE, protocol=all]
           f2be
logpath  = /var/log/fail2ban.log
maxretry = 5
findtime = 43200      ; 12 hours
bantime  = 6048000    ; ~70 days
